name: ecotrace
description: 'EcoTrace — AI-powered carbon footprint awareness platform for India.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.3.0

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Local Cache
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Environment Config
  flutter_dotenv: ^5.2.1

  # Firebase Ecosystem
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_performance: ^0.11.3
  firebase_app_check: ^0.4.3
  firebase_remote_config: ^6.4.0
  firebase_ai: ^3.11.0

  # Google Services
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  google_sign_in: ^6.2.2

  # Connectivity
  connectivity_plus: ^6.1.4

  # Image Capture
  image_picker: ^1.1.2

  # Sharing / Export
  share_plus: ^10.1.4

  # i18n
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

dependency_overrides:
  web_socket_channel: ^3.0.1
  analyzer: ^6.4.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
